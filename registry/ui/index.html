<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>xRegistry</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div id="header-left">
        <a id="logo-link" href="#" onclick="pushState({view:'home',path:[],editMode:false});return false;"         title="All Registries">
          <svg id="xreg-logo" width="20" height="20" viewBox="0 0 663 800" fill="none" aria-hidden="true">
            <g clip-path="url(#clip0)">
              <path d="M490.6 800H662.2L494.2 461.6C562.2 438.2 648.6 380.5 648.6 238.8C648.6 5.3 413.9 0 413.9 0H3.40002L80.39 155.3H391.8C391.8 155.3 492.3 153.8 492.3 238.9C492.3 323.9 391.8 322.5 391.8 322.5H390.6L316.2 449L490.6 800Z" fill="black"/>
              <path d="M392.7 322.4H281L266.7 346.6L196.4 466.2L111.7 322.4H0L140.5 561.2L0 800H111.7L196.4 656.2L281 800H392.7L252.2 561.2L317.9 449.6L392.7 322.4Z" fill="#0066FF"/>
            </g>
            <defs>
              <clipPath id="clip0"><rect width="662.2" height="800" fill="white"/></clipPath>
            </defs>
          </svg>
        </a>
        <select id="reg-select" onchange="onRegistryChange(this.value)" title="Select Registry"></select>
        <select id="section-select" onchange="onSectionChange(this.value)" title="Select Section">
          <option value="data">Data</option>
          <option value="model">Model</option>
          <option value="capabilities">Capabilities</option>
        </select>
      </div>

      <nav id="breadcrumbs" aria-label="Breadcrumbs"></nav>

      <div id="header-spacer"></div>

      <div id="header-right">
        <div id="home-group-toggle" role="group" aria-label="Home grouping" style="display:none">
          <span class="view-btn" data-hgroup="registry" onclick="setHomeGroup('registry')" title="By Registry">
            <span class="hg-xr-sym"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 663 800" width="12" height="14" aria-hidden="true"><path d="M490.6 800H662.2L494.2 461.6C562.2 438.2 648.6 380.5 648.6 238.8C648.6 5.3 413.9 0 413.9 0H3.4L80.4 155.3H391.8C391.8 155.3 492.3 153.8 492.3 238.9C492.3 323.9 391.8 322.5 391.8 322.5H390.6L316.2 449L490.6 800Z" fill="#111"/><path d="M392.7 322.4H281L266.7 346.6L196.4 466.2L111.7 322.4H0L140.5 561.2L0 800H111.7L196.4 656.2L281 800H392.7L252.2 561.2L317.9 449.6L392.7 322.4Z" fill="#0066FF"/></svg></span>
          </span>
          <span class="view-btn" data-hgroup="types" onclick="setHomeGroup('types')" title="By Group Type">
            <span class="hg-folder-sym" id="hg-folder-icon"></span>
          </span>
        </div>
        <div id="home-layout-btn" role="group" style="display:none">
          <span class="view-btn" onclick="toggleHomeLayout()" title="List view"><span class="hv-table-sym">&#8801;</span></span>
        </div>
        <div id="data-view-toggle" role="group" aria-label="Data view mode" style="display:none">
          <span class="view-btn" data-dview="grid"  title="Grid view">
            <span class="hv-grid-icon"><span></span><span></span><span></span><span></span></span>
          </span>
          <span class="view-btn" data-dview="table" title="Table view"><span class="hv-table-sym">&#8801;</span></span>
          <span class="view-btn" data-dview="json"  title="JSON view"><span class="hv-json-sym">{}</span></span>
        </div>
        <span id="edit-btn" class="icon-btn" onclick="toggleEdit()" title="Edit" style="display:none"><span class="icon-sym pencil-sym" style="display:inline-block;transform:scaleX(-1)">&#9998;</span></span>
        <span id="gear-btn" class="icon-btn" onclick="goToConfig()" title="Config"><span class="icon-sym">&#9881;</span></span>
        <button id="compact-menu-btn" class="icon-btn" style="display:none" onclick="openCompactMenu(event)" title="Menu"><span class="icon-sym">&#9660;</span></button>
      </div>
    </header>

    <div id="content">
      <div id="left-panel" style="display:none">
        <!-- JSON view options/inlines/filters nav panel -->
        <div id="left-panel-inner"></div>
      </div>
      <main id="main-view"></main>
    </div>
  </div>

  <div id="header-popup"></div>
  <script src="specattrs.js"></script>
  <script src="app.js"></script>
</body>
</html>
