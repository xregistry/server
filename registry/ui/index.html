<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>xRegistry</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div id="header-left">
        <a id="logo-link" href="#" onclick="if(navShouldDefault(event))return true;pushState({view:'home',path:[],serverURL:'',editMode:false});return false;"         title="All Registries">
          <svg id="xreg-logo" width="20" height="20" viewBox="0 0 663 800" fill="none" aria-hidden="true">
            <g clip-path="url(#clip0)">
              <path d="M490.6 800H662.2L494.2 461.6C562.2 438.2 648.6 380.5 648.6 238.8C648.6 5.3 413.9 0 413.9 0H3.40002L80.39 155.3H391.8C391.8 155.3 492.3 153.8 492.3 238.9C492.3 323.9 391.8 322.5 391.8 322.5H390.6L316.2 449L490.6 800Z" fill="black"/>
              <path d="M392.7 322.4H281L266.7 346.6L196.4 466.2L111.7 322.4H0L140.5 561.2L0 800H111.7L196.4 656.2L281 800H392.7L252.2 561.2L317.9 449.6L392.7 322.4Z" fill="#0066FF"/>
            </g>
            <defs>
              <clipPath id="clip0"><rect width="662.2" height="800" fill="white"/></clipPath>
            </defs>
          </svg>
        </a>
      </div>

      <nav id="breadcrumbs" aria-label="Breadcrumbs"></nav>

      <div id="header-spacer"></div>

      <div id="header-right">
      <span id="editing-indicator" class="icon-btn" onclick="toggleEdit()" title="Exit edit mode" style="display:none"><span class="icon-sym pencil-sym" style="display:inline-block;transform:scaleX(-1)">&#9998;</span></span>
      <span id="xregview-indicator" class="icon-btn" onclick="toggleXregOverride()" title="Back to default view" style="display:none">
        <svg class="xregview-icon" width="14" height="17" viewBox="0 0 663 800" xmlns="http://www.w3.org/2000/svg">
          <path d="M490.6 800H662.2L494.2 461.6C562.2 438.2 648.6 380.5 648.6 238.8C648.6 5.3 413.9 0 413.9 0H3.40002L80.39 155.3H391.8C391.8 155.3 492.3 153.8 492.3 238.9C492.3 323.9 391.8 322.5 391.8 322.5H390.6L316.2 449L490.6 800Z" fill="white"/>
          <path d="M392.7 322.4H281L266.7 346.6L196.4 466.2L111.7 322.4H0L140.5 561.2L0 800H111.7L196.4 656.2L281 800H392.7L252.2 561.2L317.9 449.6L392.7 322.4Z" fill="white"/>
        </svg>
      </span>
      <span id="filters-toggle-btn" class="icon-btn" onclick="toggleFiltersPanel()" title="Close Filters / Sort" style="display:none">
        <span class="filter-funnel-icon"></span><span id="filters-toggle-count"></span><span id="filters-toggle-sort-arrow" class="filters-toggle-sort-arrow"></span>
      </span>
      <div id="view-controls" role="group" aria-label="View controls">
        <span id="view-toggle-btn" class="view-btn" onclick="toggleDataView()" title="View"></span>
      </div>
      <button id="more-menu-btn" class="icon-btn" onclick="openMoreMenu(event)" title="Menu"><span class="hv-hamburger-icon"><span></span><span></span><span></span></span></button>
      </div>
    </header>

    <div id="content">
      <div id="left-panel" style="display:none">
        <!-- JSON view options/inlines/filters nav panel -->
        <div id="left-panel-inner"></div>
      </div>
      <div id="left-panel-resizer" style="display:none"></div>
      <main id="main-view"></main>
    </div>
  </div>

  <div id="header-popup"></div>
  <script src="specattrs.js"></script>
  <script src="app.js"></script>
</body>
</html>
